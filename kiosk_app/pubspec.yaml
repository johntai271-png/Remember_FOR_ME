name: remember_for_me_kiosk
description: Android-first kiosk app for the Remember.For.Me MVP.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: any
  firebase_database: any
  flutter_tts: any
  volume_controller: any
  wakelock_plus: any
  shared_preferences: any
  permission_handler: any
  flutter_blue_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
